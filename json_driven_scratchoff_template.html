/* =========================
   PREMIUM ETSY-STYLE CASINO POLISH PASS

:root{
  --casino-red:#f52316;
  --casino-red-dark:#740900;
  --neon-purple:#7b1bff;
  --deep-purple:#12051d;
  --vegas-blue:#1261bb;
  --cream:#fff3c9;
  --hot-pink:#ff4fc3;
}
body{
  background:
    radial-gradient(circle at 12% 6%,rgba(255,214,107,.30),transparent 28%),
    radial-gradient(circle at 88% 8%,rgba(255,79,195,.22),transparent 30%),
    radial-gradient(circle at 50% 38%,rgba(245,35,22,.16),transparent 34%),
    repeating-conic-gradient(from 8deg at 50% -10%,rgba(255,255,255,.045) 0 8deg,transparent 8deg 17deg),
    linear-gradient(180deg,#2c0c3a 0%,#13051d 42%,#09020d 100%);
  background-attachment:fixed;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle,rgba(255,246,174,.9) 0 1.5px,transparent 2.5px),
    radial-gradient(circle,rgba(255,79,195,.7) 0 1.5px,transparent 2.5px),
    radial-gradient(circle,rgba(142,215,255,.7) 0 1.5px,transparent 2.5px);
  background-size:84px 84px,119px 119px,151px 151px;
  background-position:0 0,28px 42px,55px 18px;
  opacity:.20;
  z-index:-1;
}
.app{filter:drop-shadow(0 18px 45px rgba(0,0,0,.35))}
.hero,.scratch-machine,.panel{
  background:
    linear-gradient(180deg,rgba(56,16,76,.97),rgba(25,7,35,.98));
  border:1px solid rgba(255,214,107,.22);
  box-shadow:
    0 22px 70px rgba(0,0,0,.50),
    inset 0 1px 0 rgba(255,255,255,.10),
    0 0 0 1px rgba(255,79,195,.08),
    0 0 34px rgba(255,214,107,.10);
  position:relative;
  overflow:hidden;
}
.hero:after,.scratch-machine:after,.panel:after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 24%,transparent 72%,rgba(255,214,107,.10));
  opacity:.55;
}
.vegas-hero{background:linear-gradient(180deg,rgba(15,3,26,.96),rgba(37,9,55,.95))}
.vegas-copy{position:relative;z-index:2}
.subtitle,.bigline{color:#fff0d6;text-shadow:0 2px 8px rgba(0,0,0,.35)}
.badge{
  color:#fff7c9;
  border-color:rgba(255,214,107,.45);
  background:
    radial-gradient(circle at 30% 20%,rgba(255,255,255,.16),transparent 35%),
    linear-gradient(180deg,rgba(126,31,145,.82),rgba(56,12,75,.82));
  box-shadow:inset 0 0 12px rgba(0,0,0,.25),0 0 18px rgba(255,214,107,.12);
}
.grid{align-items:start}
.marquee{
  border:2px solid rgba(255,214,107,.75);
  background:
    linear-gradient(90deg,rgba(107,9,17,.84),rgba(93,22,120,.92),rgba(107,9,17,.84));
  color:#fff4b2;
  text-shadow:0 0 10px rgba(255,214,107,.95),0 2px 0 rgba(0,0,0,.45);
  box-shadow:
    inset 0 0 20px rgba(0,0,0,.30),
    0 0 25px rgba(255,214,107,.20),
    0 6px 0 rgba(0,0,0,.20);
  position:relative;
  overflow:hidden;
}
.marquee:before,.marquee:after{
  content:"✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦";
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  color:#ffd36b;
  opacity:.25;
  font-size:.8rem;
  letter-spacing:.35em;
  white-space:nowrap;
}
.marquee:before{left:10px}.marquee:after{right:10px}
.ticket-wrap{
  position:relative;
  padding:12px;
  border-radius:32px;
  background:
    linear-gradient(135deg,rgba(255,214,107,.38),rgba(255,79,195,.16),rgba(142,215,255,.10));
  box-shadow:0 20px 40px rgba(0,0,0,.35),0 0 35px rgba(255,214,107,.13);
}
.ticket-wrap:before{
  content:"SCRATCH & WIN GLORIA STYLE";
  display:block;
  margin:0 0 8px;
  padding:9px 12px;
  border-radius:18px;
  color:#fff3bc;
  font-weight:1000;
  font-size:.85rem;
  letter-spacing:.08em;
  text-shadow:0 0 10px rgba(255,214,107,.8);
  background:linear-gradient(90deg,#641018,#361157,#641018);
  border:1px solid rgba(255,214,107,.48);
}
.ticket{
  border:0;
  border-radius:28px;
  background:
    radial-gradient(circle at 50% 30%,#fffbe8,#f6d88c 70%,#d58a20 100%);
  box-shadow:
    inset 0 0 0 5px #7b3105,
    inset 0 0 0 10px #ffcb45,
    inset 0 0 35px rgba(0,0,0,.16),
    0 12px 0 rgba(0,0,0,.25),
    0 0 30px rgba(255,203,69,.25);
}
.ticket:before{
  content:"";
  position:absolute;
  inset:12px;
  border-radius:20px;
  border:2px dashed rgba(107,49,6,.34);
  pointer-events:none;
  z-index:3;
}
.ticket:after{
  content:"★ ★ ★";
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translateX(-50%);
  color:rgba(123,49,5,.35);
  font-weight:1000;
  letter-spacing:.35em;
  pointer-events:none;
  z-index:3;
}
.ticket-prize{z-index:1;padding:30px 26px;color:#1e0d05}
canvas{z-index:2;border-radius:28px}
.prize-card{
  background:
    radial-gradient(circle at 50% 5%,rgba(255,255,255,.9),rgba(255,246,209,.75) 40%,rgba(255,218,141,.65));
  border:2px solid rgba(111,49,0,.28);
  border-radius:22px;
  padding:14px;
  box-shadow:inset 0 0 18px rgba(255,255,255,.45),0 10px 24px rgba(0,0,0,.14);
}
.prize-emoji{text-shadow:0 4px 12px rgba(0,0,0,.22)}
.prize-title{
  color:#951308;
  text-shadow:0 1px 0 rgba(255,255,255,.75),0 0 12px rgba(255,195,43,.42);
  letter-spacing:-.02em;
}
.prize-msg{color:#2a1407;font-weight:750}
.scratch-hint{
  color:#fff2bd;
  font-weight:800;
  text-shadow:0 0 10px rgba(255,214,107,.35);
}
.actions{position:relative;z-index:2}
button{
  background:
    linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.05)),
    linear-gradient(135deg,#5f156e,#2b0f3e);
  border-color:rgba(255,214,107,.25);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 7px 0 rgba(0,0,0,.22),0 0 20px rgba(255,79,195,.12);
}
button:hover{transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 8px 0 rgba(0,0,0,.22),0 0 25px rgba(255,214,107,.18)}
button:active{transform:translateY(3px);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 3px 0 rgba(0,0,0,.22)}
.scratch-btn,.primary{
  background:
    radial-gradient(circle at 30% 20%,rgba(255,255,255,.65),transparent 18%),
    linear-gradient(135deg,#ffe071,#ff7d21 45%,#f52316 100%) !important;
  color:#250407;
  border:2px solid rgba(255,239,173,.88);
  text-shadow:0 1px 0 rgba(255,255,255,.45);
  box-shadow:0 8px 0 rgba(72,9,5,.82),0 0 30px rgba(255,123,33,.45),inset 0 0 18px rgba(255,255,255,.18);
}
.message,.finale{
  background:
    radial-gradient(circle at 20% 0%,rgba(255,214,107,.16),transparent 34%),
    linear-gradient(180deg,rgba(24,5,33,.9),rgba(11,3,18,.88));
  border:2px solid rgba(255,214,107,.34);
  box-shadow:inset 0 0 18px rgba(0,0,0,.28),0 0 24px rgba(255,214,107,.10);
  position:relative;
  z-index:2;
}
.message:before,.finale:before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:inherit;
  pointer-events:none;
  background:linear-gradient(135deg,rgba(255,214,107,.42),transparent 26%,transparent 70%,rgba(255,79,195,.26));
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  padding:2px;
  mask-composite:exclude;
  -webkit-mask-composite:xor;
}
.message h2,.finale h2,.panel h3{
  color:#fff2b8;
  text-shadow:0 0 12px rgba(255,214,107,.45),0 2px 0 rgba(0,0,0,.4);
}
.panel h3:before{content:"★ ";color:#ffd36b}.panel h3:after{content:" ★";color:#ffd36b}
.statrow{gap:12px}
.stat{
  border-radius:999px;
  aspect-ratio:1.08/1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 35% 25%,rgba(255,255,255,.20),transparent 26%),
    radial-gradient(circle,#69217d 0 45%,#35104c 46% 64%,#ffd36b 65% 70%,#65171d 71% 100%);
  border:2px dashed rgba(255,239,173,.75);
  box-shadow:0 10px 20px rgba(0,0,0,.28),0 0 18px rgba(255,214,107,.14),inset 0 0 16px rgba(0,0,0,.25);
}
.stat b{color:#fff2b8;font-size:clamp(1.45rem,5vw,2.1rem);text-shadow:0 0 12px rgba(255,214,107,.75),0 3px 0 rgba(0,0,0,.42)}
.stat span{color:#fff0d0;font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:.72rem}
.logitem{
  position:relative;
  color:#2a1004;
  background:
    linear-gradient(90deg,transparent 0 12px,#fff3c9 12px calc(100% - 12px),transparent calc(100% - 12px)),
    radial-gradient(circle at left center,transparent 0 9px,#fff3c9 10px),
    radial-gradient(circle at right center,transparent 0 9px,#fff3c9 10px);
  border:1px solid rgba(255,214,107,.55);
  box-shadow:0 8px 18px rgba(0,0,0,.20);
  font-weight:800;
  padding:11px 16px;
}
.logitem:before{
  content:"🎟️";
  margin-right:6px;
}
.claim{
  background:rgba(0,0,0,.36);
  border-color:rgba(255,214,107,.32);
  box-shadow:inset 0 0 18px rgba(0,0,0,.25);
}
.footer{color:#dbc5df;text-shadow:0 2px 8px rgba(0,0,0,.35)}
.toast{border-color:rgba(255,214,107,.35);box-shadow:0 0 25px rgba(255,214,107,.18)}
@media(max-width:520px){
  body{padding:8px}
  .ticket-wrap{padding:8px;border-radius:24px}
  .ticket-wrap:before{font-size:.72rem;padding:8px}
  .ticket{min-height:282px;border-radius:22px;box-shadow:inset 0 0 0 4px #7b3105,inset 0 0 0 8px #ffcb45,inset 0 0 26px rgba(0,0,0,.16),0 9px 0 rgba(0,0,0,.25)}
  .ticket-prize{padding:23px 18px}.prize-card{padding:10px}.prize-msg{font-size:.95rem}
  .stat{aspect-ratio:auto;border-radius:18px;min-height:96px}
  .marquee:before,.marquee:after{display:none}
}

}
function showFinale(){
 if(GAME_CONFIG.cashMode && bestWin < (GAME_CONFIG.minimumCashWin||0)){bestWin=GAME_CONFIG.minimumCashWin;bestTitle="Guaranteed Birthday Hope Bonus";update()}
 $("finale").classList.add("show");
 if(GAME_CONFIG.cashMode) $("finalText").innerHTML=`${esc(GAME_CONFIG.recipientName)}’s best official scratch win is <b>$${bestWin}</b>. The house did not win today. ${esc(GAME_CONFIG.recipientName)} did.`;
 else $("finalText").innerHTML=`${esc(GAME_CONFIG.recipientName)} completed all <b>${GAME_CONFIG.ticketCount}</b> official tickets and collected the full birthday experience.`;
 $("claimText").textContent=claimMessage();burst();$("finale").scrollIntoView({behavior:"smooth",block:"nearest"});
}
async function copyClaim(){try{await navigator.clipboard.writeText(claimMessage());toast("Claim text copied.")}catch(e){prompt("Copy this claim text:",claimMessage())}}
function shareClaim(){if(navigator.share){navigator.share({title:`${GAME_CONFIG.recipientName}’s ${GAME_CONFIG.gameTitle}`,text:claimMessage()}).catch(()=>{})}else copyClaim()}
function resetGame(){
 ticketsLeft=GAME_CONFIG.ticketCount;bestWin=0;bestTitle="";revealed=false;finished=false;logItems=[];$("finale").classList.remove("show");
 const c=GAME_CONFIG;
 $("message").innerHTML=`<h2>Welcome back, ${esc(c.recipientName)}!</h2><p>${esc(c.overridePerson)} requested a rescratch, so the casino has officially reset.</p><p>You get <b>${c.ticketCount} official tickets</b> again. ${esc(c.recipientName)}’s scratch luck has been reloaded.</p><p class="ralph">Important casino rule: if ${esc(c.recipientName)} wins again, ${esc(c.overridePerson)} still may not object successfully.</p>`;
 update();addLog(`${c.gameTitle} restarted. ${c.overridePerson} demanded a rescratch.`);newTicket();$("ticket").scrollIntoView({behavior:"smooth",block:"center"});
}
function burst(){let box=$("confetti"),bits=GAME_CONFIG.confetti||["🎂","💐","✨","👑","💸","❤️","🎟️","🍔"];for(let i=0;i<38;i++){let s=document.createElement("span");s.textContent=bits[Math.floor(Math.random()*bits.length)];s.style.left=Math.random()*100+"vw";s.style.animationDelay=Math.random()*.35+"s";s.style.fontSize=18+Math.random()*18+"px";box.appendChild(s);setTimeout(()=>s.remove(),3300)}}
function toast(m){$("toast").textContent=m;$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),1700)}
let audioCtx=null;function getAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx}
function tone(freq,dur=.08,type="sine",vol=.08,delay=0){try{const c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.setValueAtTime(freq,c.currentTime+delay);g.gain.setValueAtTime(.0001,c.currentTime+delay);g.gain.exponentialRampToValueAtTime(vol,c.currentTime+delay+.01);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+delay+dur);o.connect(g);g.connect(c.destination);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur+.02)}catch(e){}}
function scratchSound(){tone(150,.035,"sawtooth",.018,0);tone(170,.03,"sawtooth",.014,.035)}
function winSound(amount=0){if(amount>=50){[523,659,784,1046].forEach((f,i)=>tone(f,.13,"sine",.09,i*.11));tone(1318,.22,"sine",.08,.48)}else if(amount>0){[523,659,784].forEach((f,i)=>tone(f,.11,"sine",.075,i*.1))}else{tone(330,.09,"sawtooth",.045,0);tone(260,.10,"sawtooth",.045,.10);tone(390,.08,"triangle",.04,.23)}}
canvas.addEventListener("mousedown",start);canvas.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
canvas.addEventListener("touchstart",start,{passive:false});canvas.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",end);
$("nextBtn").onclick=newTicket;$("shareBtn").onclick=shareClaim;$("copyBtn").onclick=copyClaim;$("restartBtn").onclick=resetGame;

(async function init(){
 GAME_CONFIG = await loadConfig();
 ticketsLeft=GAME_CONFIG.ticketCount;
 applyConfigToPage();
 update();addLog(`${GAME_CONFIG.gameTitle} opened. ${GAME_CONFIG.recipientName} has ${GAME_CONFIG.ticketCount} official tickets.`);newTicket();
})();
</script>
